<tr id="task-row-{{ task.id }}">
    <td class="px-6 py-4 whitespace-nowrap">
        <div class="flex items-center">
            <div>
                <a href="{% url 'tasks:detail' task.id %}" class="text-sm font-medium text-indigo-600 hover:text-indigo-900">
                    {{ task.name }}
                </a>
                {% if task.description %}
                <div class="text-sm text-gray-500 truncate max-w-xs">{{ task.description }}</div>
                {% endif %}
            </div>
        </div>
    </td>
    <td class="px-6 py-4 whitespace-nowrap">
        {% include "components/status_badge.html" with status=task.status %}
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
        {{ task.priority|default:"1" }}
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
        {{ task.created_at|slice:":10" }}
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
        {% if task.status == 'pending' %}
        <button hx-post="{% url 'tasks:execute' task.id %}"
                hx-target="#task-row-{{ task.id }}"
                hx-swap="outerHTML"
                class="text-indigo-600 hover:text-indigo-900 mr-2">
            Execute
            <span class="htmx-indicator">...</span>
        </button>
        <button hx-post="{% url 'tasks:complete' task.id %}"
                hx-target="#task-row-{{ task.id }}"
                hx-swap="outerHTML"
                class="text-green-600 hover:text-green-900 mr-2">
            Complete
        </button>
        <button hx-post="{% url 'tasks:fail' task.id %}"
                hx-target="#task-row-{{ task.id }}"
                hx-swap="outerHTML"
                class="text-red-600 hover:text-red-900">
            Fail
        </button>
        {% else %}
        <a href="{% url 'tasks:detail' task.id %}" class="text-gray-600 hover:text-gray-900">
            View
        </a>
        {% endif %}
    </td>
</tr>
