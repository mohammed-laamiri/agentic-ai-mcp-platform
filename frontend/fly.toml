app = "agentic-ai-frontend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DEBUG = "False"
  BACKEND_API_URL = "https://agentic-ai-backend.fly.dev/api"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  memory = "1gb"
  cpus = 1