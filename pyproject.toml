[project]
name = "agentic-ai-mcp-platform"
version = "0.1.0"
description = "Agentic AI MCP Platform"
requires-python = ">=3.11"

dependencies = [
    "chromadb>=1.5.2",
    "fastapi>=0.109,<0.116",
    "onnxruntime==1.18.0",
    "protobuf==3.20.3",
    "pydantic>=2.5,<3",
    "pydantic-settings>=2.1,<3",
    "slowapi>=0.1.9",
    "sqlmodel>=0.0.16,<0.1",
    "uvicorn>=0.27",
]

# ==========================================================
# DEV DEPENDENCIES (USED BY UV)
# ==========================================================
[dependency-groups]
dev = [
    "pytest>=9.0",
    "pytest-asyncio>=1.3",
    "pytest-cov>=4.1",
    "httpx>=0.28",
    "ruff>=0.2",
    "mypy>=1.8",
]

# ==========================================================
# BUILD SYSTEM
# ==========================================================
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.hatch.build]
exclude = [
    "tests",
    "chroma_db",
    ".pytest_cache",
    "__pycache__",
    ".mypy_cache",
    ".ruff_cache",
]

# ==========================================================
# PYTEST CONFIGURATION
# ==========================================================
[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
asyncio_mode = "auto"

# ==========================================================
# RUFF CONFIG
# ==========================================================
[tool.ruff]
line-length = 88
target-version = "py311"

# ==========================================================
# MYPY CONFIG
# ==========================================================
[tool.mypy]
python_version = "3.11"
strict = true
