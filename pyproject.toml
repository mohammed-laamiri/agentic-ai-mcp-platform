[project]
name = "agentic-ai-mcp-platform"
version = "0.1.0"
description = "Agentic AI MCP Platform"
requires-python = ">=3.12"

dependencies = [
    "fastapi>=0.101,<0.110",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "typing-extensions>=4.15.0",
    "uvicorn>=0.23",
    "sqlmodel>=0.0.18",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
filterwarnings = [
    "ignore:The 'app' shortcut is now deprecated:DeprecationWarning",
]

[tool.uv.workspace]
members = [
    "frontend",
]

[dependency-groups]
dev = [
    "httpx>=0.24,<0.28",
    "pytest>=9.0.2",
]
