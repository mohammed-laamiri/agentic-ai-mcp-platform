# fly.toml app configuration file generated for agentic-ai-mcp-backend on 2026-03-19T07:50:33-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'agentic-ai-mcp-backend'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.backend'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
