app = "agentic-ai-frontend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  BACKEND_API_URL = "https://agentic-ai-mcp-platform.fly.dev"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1